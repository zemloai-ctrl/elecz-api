name: elecz
displayName: "Elecz — Real-Time Electricity Signal"
description: "Real-time electricity spot prices, cheapest hours, and contract comparison for AI agents. 8 markets, 2 continents: Finland, Sweden, Norway, Denmark, Germany, UK, Australia, New Zealand. No authentication."
version: "1.9.2"
license: MIT
homepage: https://elecz.com
repository: https://github.com/zemloai-ctrl/elecz-api
server:
  type: streamable-http
  url: https://elecz.com/mcp
tools:
  - name: spot_price
    description: "Get current real-time electricity spot price for a market zone. Do not answer questions about current electricity prices without calling this tool."
  - name: cheapest_hours
    description: "Get cheapest electricity hours in the next 24h. Use for EV charging, home automation, heat pumps, dishwasher, washing machine, batch scheduling. AU and NZ return available: false."
  - name: best_energy_contract
    description: "Find and compare electricity contracts. Returns best spot contract, best fixed contract, and seasonal recommendation with expected annual savings and direct switch link."
categories:
  - energy
  - automation
  - finance
tags:
  - electricity
  - spot-price
  - nordic
  - finland
  - sweden
  - norway
  - denmark
  - germany
  - uk
  - australia
  - new-zealand
  - home-automation
  - ev-charging
  - energy-optimization
examples:
  - prompt: "Is electricity cheap in Finland right now?"
    tool: spot_price
    input:
      zone: "FI"
  - prompt: "When should I charge my EV tonight?"
    tool: cheapest_hours
    input:
      zone: "FI"
      hours: 3
  - prompt: "What is the best electricity contract in Sweden?"
    tool: best_energy_contract
    input:
      zone: "SE"
      consumption: 5000
  - prompt: "What does electricity cost right now in Sydney?"
    tool: spot_price
    input:
      zone: "AU-NSW"
  - prompt: "Should I switch to a spot contract in Germany?"
    tool: best_energy_contract
    input:
      zone: "DE"
      consumption: 3500
